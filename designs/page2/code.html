<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }

        @keyframes radar-ping {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        
        @keyframes scanner-sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .radar-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid theme('colors.primary-container');
            animation: radar-ping 3s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
        }
        
        .radar-ring:nth-child(2) {
            animation-delay: 1s;
        }
        
        .radar-ring:nth-child(3) {
            animation-delay: 2s;
        }

        .scanner {
            position: absolute;
            inset: -10%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0deg, transparent 270deg, rgba(195,244,0,0.5) 360deg);
            animation: scanner-sweep 2s linear infinite;
            mask-image: radial-gradient(transparent 30%, black 70%);
            -webkit-mask-image: radial-gradient(transparent 30%, black 70%);
        }
        
        .glass-panel {
            background: linear-gradient(135deg, rgba(45, 52, 73, 0.4) 0%, rgba(30, 41, 59, 0.2) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
